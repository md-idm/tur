server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Docker bind mount (esp. Windows): avoid serving a cached/stale copy of edited static files
    sendfile off;

    # Default nginx redirects use $host without port; with 8080:80 mapping that broke Location URLs
    absolute_redirect off;

    # iframe1.html: proxy proxy.travel /assets through localhost so CSS @font-face resolves to same-origin
    # (avoids CORS on fonts). Rewrite absolute font URLs inside proxied CSS.
    location /pt-assets/ {
        proxy_pass https://proxy.travel/assets/;
        proxy_ssl_server_name on;
        proxy_set_header Host proxy.travel;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Accept-Encoding "";
        proxy_buffering on;
        sub_filter_types text/css;
        sub_filter_once off;
        sub_filter 'https://proxy.travel/assets/fonts/' '/pt-assets/fonts/';
        sub_filter 'http://proxy.travel/assets/fonts/' '/pt-assets/fonts/';
    }

    # /ru without trailing slash: explicit redirect so Host port is preserved (e.g. localhost:8080)
    location = /ru {
        return 301 $scheme://$http_host/ru/;
    }

    # Do not add "return 301 /index.html": try_files falls back to index.html for missing URIs,
    # otherwise index.html would be served instead of 404 for unknown paths.

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /api/send {
        default_type application/json;
        return 200 '1';
    }
}
