<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>postMessage test — iframe</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 8px; font-size: 13px; }
    #log {
      white-space: pre-wrap;
      word-break: break-all;
      background: #0d1117;
      color: #79c0ff;
      padding: 8px;
      border-radius: 6px;
      min-height: 80px;
      margin: 0;
    }
  </style>
</head>
<body>
  <p><strong>iframe</strong> — шлёт <code>postMessage</code> родителю каждые 15 с</p>
  <pre id="log"></pre>
  <script>
    (function () {
      var logEl = document.getElementById('log');
      function append(line) {
        console.log('[iframe]', line);
        logEl.textContent += line + '\n';
        logEl.scrollTop = logEl.scrollHeight;
      }

      function sendToParent() {
        var iso = new Date().toISOString();
        var payload = 'test-ping:' + iso;
        try {
          window.parent.postMessage(payload, '*');
          append('Отправлено родителю: ' + payload);
        } catch (err) {
          append('Ошибка postMessage: ' + err);
        }
      }

      append('Старт: первая отправка сразу, далее каждые 15 с.');
      sendToParent();
      setInterval(sendToParent, 15000);
    })();
  </script>
</body>
</html>
