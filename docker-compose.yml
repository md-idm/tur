# From repo root: docker compose up -d
# Site: http://localhost/  (or http://127.0.0.1:8080/ if you map 8080:80 below)
#
# ./site is bind-mounted: edit files on the host → same files in the container immediately.
# Reload the browser (Ctrl+F5 if cache is sticky). No image rebuild needed.
#
# After editing nginx/default.conf:  docker compose exec web nginx -s reload

services:
  web:
    image: nginx:alpine
    ports:
      - "80:80"
      # If port 80 is busy (IIS, Skype, etc.):
      # - "8080:80"
    volumes:
      # Host project folder → nginx document root (live sync)
      - ./site:/usr/share/nginx/html:rw
      # Nginx site config (edit on host; then: docker compose exec web nginx -s reload)
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:rw
