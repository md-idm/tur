services:
  web:
    image: nginx:alpine
    # Site: http://localhost/ — host port 80 maps to container port 80 (no :8080 mismatch)
    ports:
      - "80:80"
    # If port 80 is taken (IIS, Skype, etc.), replace the line above with:
    # - "8080:80"
    # then open http://127.0.0.1:8080/ and run: docker compose down && docker compose up -d
    volumes:
      - ./site:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
